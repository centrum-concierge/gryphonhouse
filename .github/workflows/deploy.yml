name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site structure
        run: |
          mkdir -p _site/gryphonhouse
          cp -r landing_page/. _site/gryphonhouse/
          cat > _site/index.html << 'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="UTF-8" />
              <meta http-equiv="refresh" content="0; url=https://centrumconcierge.com" />
              <title>Redirecting…</title>
            </head>
            <body>
              <a href="https://centrumconcierge.com">Redirecting to centrumconcierge.com…</a>
            </body>
          </html>
          EOF
          echo 'centrumconcierge.net' > _site/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
